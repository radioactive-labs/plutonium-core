name: Release

# CI release is DISABLED for now — the auto-trigger on tag push is commented out,
# so pushing a `vX.Y.Z` tag will NOT cut a GitHub Release. Publishing (gem + npm)
# happens from a laptop via `rake release:publish`. Re-enable by restoring the
# `push.tags` trigger below. `workflow_dispatch` is kept as a manual escape hatch.
on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - 'v*'

permissions:
  contents: write

# Publishing to RubyGems + npm happens from a laptop (rake release:publish).
# This workflow only cuts the GitHub Release from the tag — it never pushes to a
# registry, so it can't race the local publish.
jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Build the gem only to attach it to the GitHub Release — it is NOT pushed
      # to RubyGems here (the laptop already did that via rake release:publish).
      - name: Build gem
        run: gem build plutonium.gemspec

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        run: |
          git-cliff --config .cliff.toml --tag ${{ github.ref_name }} --strip all > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            plutonium-${{ steps.version.outputs.VERSION }}.gem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
